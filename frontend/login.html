<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Ling-Agent</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ling-Agent" alt="Logo">
                <h1>Ling-Agent</h1>
            </div>
            <p class="subtitle">欢迎回来，请登录您的智能体账号</p>

            <form id="login-form">
                <div class="input-group">
                    <i class="fa-regular fa-user icon"></i>
                    <input type="text" id="username" placeholder="请输入用户名" required autocomplete="off" />
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" id="password" placeholder="请输入至少6位密码" required />
                </div>
                <div id="error-msg" class="error-msg"></div>

                <button type="submit" class="btn primary-btn" id="login-btn">登 录</button>
                <button type="button" class="btn secondary-btn" id="register-btn">注 册新账号</button>
            </form>
            
            <div class="footer-hint">
                由 FastAPI & Langchain 强力驱动
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
