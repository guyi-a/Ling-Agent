<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ling-Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="new-chat-btn" title="新对话"><i class="fa-regular fa-pen-to-square"></i></button>
                </div>
            </div>

            <nav class="main-nav">
                <a href="#" class="nav-item active">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ling-Agent" alt="Logo" class="nav-icon avatar-img">
                    <span>Ling-Agent</span>
                </a>
            </nav>

            <div class="history-section">
                <div class="history-title">历史对话</div>
                <div class="history-list" id="history-list"></div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=demouser" alt="User" class="avatar-img" id="user-avatar">
                    <span class="text-truncate" id="current-username">未登录</span>
                    <button class="icon-btn" id="logout-btn" title="退出登录" style="margin-left:auto;"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-title">
                    <h1 id="chat-title">新对话</h1>
                    <span class="subtitle">内容由 AI 生成</span>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="message-list" id="chat-messages">
                    <div class="message agent" id="welcome-message">
                        <div class="message-avatar">
                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ling-Agent" alt="AI">
                        </div>
                        <div class="message-content">
                            <div class="markdown-content">
                                <p>你好！我是 Ling-Agent，已成功连接到你的后端服务。</p>
                                <p>请在下方输入框中发送消息，即可开始与我对话！</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="chat-input" placeholder="发消息与 AI 助手对话..." rows="1"></textarea>
                    </div>
                    <div class="input-toolbar">
                        <div class="toolbar-left">
                            <button class="tool-btn" id="upload-btn" title="上传文件到工作区"><i class="fa-solid fa-plus"></i></button>
                            <input type="file" id="file-input" style="display:none" multiple>
                        </div>
                        <div class="toolbar-right">
                            <button class="voice-btn" id="stop-btn" title="停止生成" style="display:none"><i class="fa-solid fa-stop"></i></button>
                            <button class="voice-btn" id="send-btn" title="发送 (Enter)"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Workspace Sidebar -->
        <aside class="workspace-sidebar" id="workspace-sidebar">
            <div class="ws-header">
                <span class="ws-title"><i class="fa-solid fa-folder-tree"></i> 工作区</span>
                <button class="icon-btn" id="ws-refresh-btn" title="刷新工作区"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <div class="ws-body" id="ws-body">
                <div class="ws-empty">选择会话后查看文件</div>
            </div>
            <div class="ws-footer">
                <button class="ws-upload-btn" id="ws-upload-btn">
                    <i class="fa-solid fa-upload"></i> 上传文件
                </button>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
